<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #05070a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* [ESTILOS MANTIDOS DO SEU ORIGINAL] */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05070a; z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .moldura-neon { border: 2.4px solid #00f2ff; padding: 72px; border-radius: 24px; text-align: center; box-shadow: 0 0 48px rgba(0, 242, 255, 0.5), inset 0 0 24px rgba(0, 242, 255, 0.2); }
        .splash-titulo { font-size: 3.6em; color: rgba(0, 242, 255, 0.4); text-transform: uppercase; margin-bottom: 12px; font-weight: normal; }
        .splash-subtitulo { font-size: 2.64em; color: #00f2ff; text-transform: uppercase; margin-bottom: 24px; font-weight: normal; }
        .splash-info { font-size: 1.8em; color: #00f2ff; margin-bottom: 48px; }
        .splash-footer { color: #808080; font-size: 1.08em; margin-bottom: 48px; }
        .btn-iniciar { background: transparent; color: #00f2ff; border: 2.4px solid #00f2ff; padding: 18px 48px; border-radius: 60px; font-size: 1.44em; cursor: pointer; animation: piscar 1.5s infinite; }
        @keyframes piscar { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        #titulo-projeto { color: #00f2ff; font-size: clamp(24px, 5vw, 48px); font-weight: 900; text-transform: uppercase; margin-bottom: 15px; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        #linha-status { background: rgba(10, 15, 20, 0.9); border: 1px solid #1a3a5a; padding: 15px 30px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 1200px; text-align: center; }
        .texto-status { color: #ffcc00; font-size: clamp(16px, 2.5vw, 24px); font-weight: bold; text-transform: uppercase; }
        
        #quadro-simulacao { position: relative; width: 100%; max-width: 1600px; aspect-ratio: 1920 / 1080; background-color: #000; border: 2px solid #333; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .camada { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .tecla-interativa { position: absolute; z-index: 60; cursor: pointer; transition: transform 0.1s; }
        
        #comp-dg { width: 4%; top: 26%; left: 12%; }
        #comp-dr { width: 5%; top: 29%; left: 23.6%; }
        #comp-int { width: 6%; top: 67%; left: 63%; }

        #lampada-final { position: absolute; top: 10%; left: 80%; width: 10%; z-index: 70; pointer-events: none; }
        .oculto { display: none !important; }
        
        #painel-dispositivos { position: absolute; top: 25%; left: 59%; width: 15%; background: rgba(5, 15, 30, 0.95); border: 2px solid #00f2ff; border-radius: 8px; z-index: 500; }
        #painel-dispositivos h3 { background: #008899; color: white; text-align: center; font-size: 1.1vw; padding: 8px; text-transform: uppercase; border-bottom: 2px solid #00f2ff; }
        .linha-dispositivo { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; margin-bottom: 5px; background: rgba(255, 255, 255, 0.05); border-left: 4px solid #1a3a5a; font-weight: bold; font-size: 1vw; }
        .status-on { color: #00ff00; }
        .status-off { color: #ff3333; }

        #btn-ajuda { position: absolute; bottom: 10.5%; left: 15%; background: linear-gradient(180deg, #008899, #004455); color: white; border: 1px solid #00f2ff; padding: 0.6% 3.5%; font-size: 1.1vw; font-weight: bold; border-radius: 50px; cursor: pointer; z-index: 200; }
        #btn-reiniciar { position: absolute; bottom: 3%; left: 13.5%; background: linear-gradient(180deg, #cc0000, #880000); color: white; border: 1px solid #500; padding: 0.6% 3.5%; font-size: 1.1vw; font-weight: bold; border-radius: 50px; cursor: pointer; z-index: 200; }

        #overlay-ajuda { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .modal-ajuda { background: #0a1015; border: 2px solid #1a3a5a; width: 40%; padding: 30px; border-radius: 12px; text-align: center; }
        .item-ajuda { background: rgba(255, 255, 255, 0.03); border: 1px solid #1a3a5a; margin-bottom: 10px; padding: 15px; color: white; text-align: left; cursor: pointer; font-weight: normal; font-size: 1.1vw; }
        #visualizador-tecnico { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #instrucao-clique { background: #ffcc00; color: #000; padding: 5px 15px; font-weight: bold; border-radius: 4px; margin-bottom: 15px; text-transform: uppercase; font-size: 1vw; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .modal-ajuda button { border-radius: 50px !important; padding: 12px 30px !important; border: none !important; cursor: pointer !important; background-color: yellow !important; color: black !important; }
        #visualizador-tecnico button { border-radius: 50px !important; padding: 10px 30px !important; border: none !important; cursor: pointer !important; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="moldura-neon">
            <h1 class="splash-titulo">LABORATÓRIO SMT PRO</h1>
            <h2 class="splash-subtitulo">INTERRUPTOR SIMPLES</h2>
            <button class="btn-iniciar" onclick="document.getElementById('splash-screen').style.display='none'">CLIQUE PARA INICIAR O LABORATÓRIO</button>
        </div>
    </div>

    <h1 id="titulo-projeto">LABORATÓRIO SMT PRO</h1>
    <div id="linha-status"><span id="label-status" class="texto-status">SISTEMA PRONTO</span></div>

    <main id="quadro-simulacao">
        <img src="ambiente.jpg" class="camada">
        <img id="comp-dg" src="al_dg_off.png" data-state="off" class="tecla-interativa" onclick="toggleComp(this, 'al_dg_off.png', 'al_dg_on.png')">
        <img id="comp-dr" src="al_dr_off.png" data-state="off" class="tecla-interativa" onclick="toggleComp(this, 'al_dr_off.png', 'al_dr_on.png')">
        <img id="comp-int" src="tec_int_off.png" data-state="off" class="tecla-interativa" onclick="toggleComp(this, 'tec_int_off.png', 'tec_int_on.png')">
        <img id="lampada-final" src="lamp_on.png" class="oculto">
        
        <div id="interacao-container"></div>
        <button id="btn-ajuda" onclick="abrirAjuda()">AJUDA</button>
        <button id="btn-reiniciar" onclick="location.reload()">REINICIAR</button>

        <div id="overlay-ajuda" class="oculto">
            <div class="modal-ajuda">
                <h2 style="color:#ffcc00; margin-bottom:20px;">Ajuda Técnica</h2>
                <div class="item-ajuda" onclick="mostrarImagemTecnica('ligaint.png')">1. Ligação do interruptor</div>
                <div class="item-ajuda" onclick="mostrarImagemTecnica('inst_con_der.png')">2. Conexões e emendas</div>
                <div class="item-ajuda" onclick="abrirAnimacaoConector()">3. Instalação do conector de derivação</div>
                <button onclick="fecharAjuda()">Fechar</button>
            </div>
        </div>

        <div id="visualizador-tecnico" class="oculto">
            <div id="instrucao-clique" class="oculto">CLIQUE NO CONECTOR PARA INSTALAÇÃO</div>
            <img id="img-tecnica-exibida" src="" style="max-width:90%; max-height:80%;">
            <button onclick="voltarParaLista()">VOLTAR</button>
        </div>
    </main>

    <script>
        const roteiro = []; 
        let etapaAtual = 99; // Simula fiação completa

        function atualizarLampada() {
            const dgOn = document.getElementById('comp-dg').getAttribute('data-state') === 'on';
            const drOn = document.getElementById('comp-dr').getAttribute('data-state') === 'on';
            const intOn = document.getElementById('comp-int').getAttribute('data-state') === 'on';
            const lampada = document.getElementById('lampada-final');
            
            if (dgOn && drOn && intOn) {
                lampada.classList.remove('oculto');
            } else {
                lampada.classList.add('oculto');
            }
        }

        function toggleComp(el, off, on) {
            const state = el.getAttribute('data-state') === 'off' ? 'on' : 'off';
            el.src = state === 'on' ? on : off;
            el.setAttribute('data-state', state);
            atualizarLampada();
        }

        function abrirAnimacaoConector() {
            const img = document.getElementById('img-tecnica-exibida');
            const legenda = document.getElementById('instrucao-clique');
            img.src = 'conectder_on.png'; 
            legenda.classList.remove('oculto');
            img.onclick = function() {
                this.src = this.src.includes('conectder_on.png') ? 'conectder_off.png' : 'conectder_on.png';
            };
            document.getElementById('visualizador-tecnico').classList.remove('oculto');
        }

        function mostrarImagemTecnica(src) {
            const img = document.getElementById('img-tecnica-exibida');
            document.getElementById('instrucao-clique').classList.add('oculto');
            img.src = src;
            img.onclick = null;
            document.getElementById('visualizador-tecnico').classList.remove('oculto');
        }

        function voltarParaLista() {
            document.getElementById('visualizador-tecnico').classList.add('oculto');
            document.getElementById('instrucao-clique').classList.add('oculto');
        }

        function abrirAjuda() { document.getElementById('overlay-ajuda').classList.remove('oculto'); }
        function fecharAjuda() { document.getElementById('overlay-ajuda').classList.add('oculto'); }
    </script>
</body>
</html>
