<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT - Treinamento de Conexão</title>
    <style>
        /* Estilização Base - Identidade Visual Dark Electric */
        :root {
            --bg-color: #0d0f12;
            --container-bg: #14181f;
            --neon-cyan: #00f3ff;
            --neon-red: #ff0055;
            --text-color: #e2e8f0;
            --border-radius: 16px;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Container Principal do Simulador */
        .simulador-container {
            background-color: var(--container-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: var(--border-radius);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            padding: 20px;
            width: 100%;
            max-width: 1024px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        h2 {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* Instruções e Status */
        .status-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            border-left: 4px solid var(--neon-cyan);
        }

        /* Área do Canvas */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }

        /* Painel de Controle de Acesso / Botões */
        .control-panel {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--neon-red);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-red);
        }

        /* Painel de Login/Senha */
        .auth-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-senha {
            background: #1a1f29;
            border: 1px solid var(--neon-cyan);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="simulador-container">
        <h2>Simulador SMT Pro</h2>
        
        <div class="status-box" id="instrucao">
            Carregando simulador...
        </div>

        <div class="canvas-wrapper">
            <canvas id="cenarioCanvas" width="1024" height="576"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn" id="btn-reset" onclick="resetarSimulador()">Reiniciar Tela</button>
            
            <div class="auth-box" id="painel-auth">
                <input type="password" id="campo-senha" class="input-senha" placeholder="Senha do Painel">
                <button class="btn" style="border-color: var(--neon-cyan); color: var(--neon-cyan);" onclick="logoutSeguro()">Sair</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('cenarioCanvas');
        const ctx = canvas.getContext('2d');
        const instrucaoTxt = document.getElementById('instrucao');
        const campoSenha = document.getElementById('campo-senha');

        // Configuração do Roteiro (Atualizado estritamente para 39 frames no RETORNO_1)
const roteiro = [
    { nome: "Fase do Circuito - Clique nos pontos indicados", pasta: "FASE_REDE", total: 64, imgId: "img-fase-rede", cor: "fase", origem: { x: 27, y: 38.5 }, destino: { x: 98.5, y: 17.5 } },
    { nome: "Neutro do Circuito - Clique nos pontos indicados", pasta: "NEUTRO_REDE", total: 76, imgId: "img-neutro-rede", cor: "neutro", origem: { x: 44.3, y: 35.2 }, destino: { x: 98.5, y: 14 } },
    { nome: "Fase do Interruptor - Clique nos pontos indicados", pasta: "FASE_2", total: 33, imgId: "img-fase-circuito", cor: "fase", origem: { x: 72, y: 19 }, destino: { x: 67, y: 70 } },
    { nome: "Retorno da Lâmpada (A) - Clique nos pontos indicados", pasta: "RETORNO", total: 45, imgId: "img-retorno", cor: "retorno", origem: { x: 67, y: 76.5 }, destino: { x: 77.5, y: 57 } },
    { nome: "Retorno da Lâmpada (B) - Clique nos pontos indicados", pasta: "RETORNO_1", total: 39, imgId: "img-retorno1", cor: "retorno", origem: { x: 77.7, y: 34 }, destino: { x: 89, y: 58 } },
    { nome: "Neutro da Lâmpada (A) - Clique nos pontos indicados", pasta: "NEUTRO_2", total: 25, imgId: "img-neutro-circuito", cor: "neutro", origem: { x: 77.8, y: 14.2 }, destino: { x: 79.5, y: 56.5 } },
    { network: "Neutro da Lâmpada (B) - Clique nos pontos indicados", pasta: "NEUTRO_3", total: 26, imgId: "img-neutro-3", cor: "neutro", origem: { x: 92.5, y: 15.8 }, destino: { x: 90.6, y: 58 } }
];

        let passoAtual = 0;
        let frameAtual = 1;
        let clicouOrigem = false;
        let animando = false;
        let cacheImagens = {};

        // Inicialização do Simulador
        function init() {
            carregarImagensPassoAtual();
            atualizarInterface();
        }

        function atualizarInterface() {
            if (passoAtual < roteiro.length) {
                instrucaoTxt.textContent = roteiro[passoAtual].nome;
            } else {
                instrucaoTxt.textContent = "Treinamento Concluído com Sucesso!";
            }
            renderizarCenario();
        }

        // Simulação do cache/carregamento dinâmico
        function carregarImagensPassoAtual() {
            if (passoAtual >= roteiro.length) return;
            let passo = roteiro[passoAtual];
            cacheImagens[passo.pasta] = [];
            
            // Pré-carrega o primeiro frame estático
            let img = new Image();
            img.src = `${passo.pasta}/quadro0001.png`;
            img.onload = () => { if(!animando) renderizarCenario(); };
            cacheImagens[passo.pasta][1] = img;
        }

        // Renderização no Canvas
        function renderizarCenario() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fundo de simulação (Preto ou imagem base se houver)
            ctx.fillStyle = "#1b1e24";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha o frame atual se ele existir no cache
            if (passoAtual < roteiro.length) {
                let passo = roteiro[passoAtual];
                if (cacheImagens[passo.pasta] && cacheImagens[passo.pasta][frameAtual]) {
                    ctx.drawImage(cacheImagens[passo.pasta][frameAtual], 0, 0, canvas.width, canvas.height);
                }
            }

            // Desenha os pontos de clique apenas se não estiver animando
            if (!animando && passoAtual < roteiro.length) {
                desenharPontosDeConexao();
            }
        }

        function desenharPontosDeConexao() {
            let passo = roteiro[passoAtual];
            
            // Ponto de Origem (Apenas se ainda não foi clicado)
            if (!clicouOrigem) {
                desenharAlvo(passo.origem.x, passo.origem.y, "#ff0055");
            }
            // Ponto de Destino (Apenas se a origem já foi validada)
            else {
                desenharAlvo(passo.destino.x, passo.destino.y, "#00f3ff");
            }
        }

        function desenharAlvo(porcentagemX, porcentagemY, cor) {
            let x = (porcentagemX / 100) * canvas.width;
            let y = (porcentagemY / 100) * canvas.height;

            ctx.beginPath();
            ctx.arc(x, y, 12, 0, 2 * Math.PI);
            ctx.fillStyle = cor;
            ctx.globalAlpha = 0.4;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = cor;
            ctx.globalAlpha = 1.0;
            ctx.fill();
        }

        // Monitoramento de Cliques do Usuário
        canvas.addEventListener('click', function(event) {
            if (animando || passoAtual >= roteiro.length) return;

            const rect = canvas.getBoundingClientRect();
            const xClicado = ((event.clientX - rect.left) / rect.width) * 100;
            const yClicado = ((event.clientY - rect.top) / rect.height) * 100;

            let passo = roteiro[passoAtual];
            let alvo = !clicouOrigem ? passo.origem : passo.destino;

            // Raio de tolerância do clique (Margem de erro da área clicável)
            let margem = 4; 

            if (Math.abs(xClicado - alvo.x) < margem && Math.abs(yClicado - alvo.y) < margem) {
                executarFeedbackAudio(true);
                if (!clicouOrigem) {
                    clicouOrigem = true;
                    atualizarInterface();
                } else {
                    dispararAnimacaoCabo();
                }
            } else {
                executarFeedbackAudio(false);
            }
        });

        // Controle da Animação dos Frames
        function dispararAnimacaoCabo() {
            animando = true;
            let passo = roteiro[passoAtual];
            frameAtual = 1;

            function rodarFrames() {
                if (frameAtual <= passo.total) {
                    // Carregamento 'on-the-fly' para não estourar a memória
                    let img = new Image();
                    let numeroQuadro = String(frameAtual).padStart(4, '0');
                    img.src = `${passo.pasta}/quadro${numeroQuadro}.png`;
                    
                    img.onload = () => {
                        cacheImagens[passo.pasta][frameAtual] = img;
                        renderizarCenario();
                        frameAtual++;
                        setTimeout(rodarFrames, 40); // Ajuste de velocidade da animação (~25 FPS)
                    };
                    img.onerror = () => {
                        // Se falhar o carregamento de algum frame, avança para manter a estabilidade
                        frameAtual++;
                        rodarFrames();
                    };
                } else {
                    // Finalizou a animação do cabo atual
                    animando = false;
                    clicouOrigem = false;
                    frameAtual = 1;
                    passoAtual++;
                    carregarImagensPassoAtual();
                    atualizarInterface();
                }
            }
            rodarFrames();
        }

        // Áudio e Efeitos Sonoros Simulados por API de Áudio do Navegador
        function executarFeedbackAudio(sucesso) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (sucesso) {
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Som Agudo de Sucesso
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    audioCtx.resume();
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else {
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime); // Som Grave de Erro
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    audioCtx.resume();
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch (e) {
                console.log("AudioContext não suportado ou bloqueado pelo navegador.");
            }
        }

        // Lógica de Segurança Restrita - Correção de persistência de dados
        function resetarSimulador() {
            passoAtual = 0;
            frameAtual = 1;
            clicouOrigem = false;
            animando = false;
            campoSenha.value = ""; // Limpa estritamente o campo ao resetar a tela
            init();
        }

        function logoutSeguro() {
            campoSenha.value = ""; // Garante que a credencial seja destruída na saída
            alert("Sessão encerrada com segurança.");
            resetarSimulador();
        }

        // Inicializa o simulador na montagem da janela
        window.onload = init;
    </script>
</body>
</html>
