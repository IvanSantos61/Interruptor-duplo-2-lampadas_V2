<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* O container trava a proporção e impede que o zoom quebre o layout */
        #game-container { 
            position: relative; 
            width: 90vw; 
            max-width: 1920px; 
            aspect-ratio: 1920 / 1080; 
            background: url('ambiente.jpg') no-repeat center center; 
            background-size: 100% 100%; 
        }

        /* Hotspots e Legendas fixos ao container pai */
        .hotspot-container { position: absolute; z-index: 850; }
        .hotspot { width: 100%; height: 100%; cursor: pointer; }
        .hotspot:hover { background: rgba(0, 255, 255, 0.2); border: 1px solid #00ffff; }
        .legenda { 
            display: none; position: absolute; top: 105%; left: 0; 
            font-size: 14px; color: #00ffff; white-space: nowrap; 
            background: rgba(0,0,0,0.8); padding: 5px; border: 1px solid #00ffff;
            pointer-events: none; z-index: 3000;
        }
        .hotspot:hover + .legenda { display: block; }

        /* Elementos de Jogo mantêm proporção relativa ao container */
        .bolinha { width: 2%; aspect-ratio: 1/1; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 3px solid white; z-index: 1000; box-sizing: border-box; }
        .conector { position: absolute; width: 5.2%; z-index: 999; display: none; }
        #btn_dg, #btn_dr, #btn_int { position: absolute; z-index: 990; cursor: pointer; width: 5.7%; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hotspot-container" style="top: 52%; left: 5%; width: 3%; height: 12%;"><div class="hotspot"></div><div class="legenda">REDE ELÉTRICA</div></div>
        <div class="hotspot-container" style="top: 10%; left: 6.5%; width: 2%; height: 16%;"><div class="hotspot"></div><div class="legenda">BARRA DE ATERRAMENTO</div></div>
        <div class="hotspot-container" style="top: 13%; left: 11.8%; width: 3%; height: 12%;"><div class="hotspot"></div><div class="legenda">DISJUNTOR GERAL</div></div>
        <div class="hotspot-container" style="top: 13%; left: 15.8%; width: 2.8%; height: 12%;"><div class="hotspot"></div><div class="legenda">DPS</div></div>
        <div class="hotspot-container" style="top: 12.8%; left: 19.5%; width: 7%; height: 13%;"><div class="hotspot"></div><div class="legenda">DISPOSITIVO DR</div></div>
        <div class="hotspot-container" style="top: 13%; left: 28.5%; width: 9%; height: 12%;"><div class="hotspot"></div><div class="legenda">DISJUNTORES DOS CIRCUITOS</div></div>
        <div class="hotspot-container" style="top: 10%; left: 43%; width: 2%; height: 16%;"><div class="hotspot"></div><div class="legenda">BARRA DE NEUTRO</div></div>
        <div class="hotspot-container" style="top: 58.5%; left: 35%; width: 10%; height: 14.5%;"><div class="hotspot"></div><div class="legenda">CAIXA DE PASSAGEM 4x2</div></div>
        <div class="hotspot-container" style="top: 10.5%; left: 51.5%; width: 10%; height: 14.5%;"><div class="hotspot"></div><div class="legenda">CAIXA DE PASSAGEM 4x2</div></div>
        <div class="hotspot-container" style="top: 10.5%; left: 69.2%; width: 10%; height: 14.5%;"><div class="hotspot"></div><div class="legenda">CAIXA DE PASSAGEM 4x2</div></div>
        <div class="hotspot-container" style="top: 10.5%; left: 86.5%; width: 10%; height: 14.5%;"><div class="hotspot"></div><div class="legenda">CAIXA DE PASSAGEM 4x2</div></div>
        <div class="hotspot-container" style="top: 61%; left: 86%; width: 10%; height: 14%;"><div class="hotspot"></div><div class="legenda">CAMPAINHA 127V</div></div>
        <div class="hotspot-container" style="top: 55%; left: 64%; width: 8%; height: 16%;"><div class="hotspot"></div><div class="legenda">INTERRUPTOR DE PULSO</div></div>

        <img id="derivacao_fase2" class="conector" src="con_derivacao.png" style="top: 13.3%; left: 71%;">
        <img id="derivacao_neutro" class="conector" src="con_derivacao.png" style="top: 10.2%; left: 91.5%;">
        <img id="btn_dg" src="al_dg_off.png" style="top: 26%; left: 12%;">
        <img id="btn_dr" src="al_dr_off.png" style="top: 28.6%; left: 23.4%;">
        <img id="btn_int" src="tec_int_off.png" style="top: 67.8%; left: 63.5%;">
        
        <canvas id="canvasCabo" width="1920" height="1080"></canvas>
        <div id="bolinha1" class="bolinha"></div>
        <div id="bolinha2" class="bolinha"></div>
    </div>

<script>
    // A lógica de cliques e cores (A bolinha verde está garantida aqui)
    const b1 = document.getElementById('bolinha1');
    const b2 = document.getElementById('bolinha2');
    
    // Função de clique corrigida para cor verde
    b1.onclick = () => {
        b1.style.backgroundColor = "green"; 
        b2.style.display = "block";
    };
    
    // [Restante da sua lógica de animação permanece a mesma]
</script>
</body>
</html>
