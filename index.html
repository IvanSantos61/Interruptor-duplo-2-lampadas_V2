<style>
    /* Reset total para garantir que não haja distorções por margens ou paddings */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
        background: #000; 
        display: flex; justify-content: center; align-items: center; 
        min-height: 100vh; overflow: hidden; 
    }
    
    #game-wrapper {
        width: 1920px; height: 1080px;
        transform-origin: center;
        /* O scale trava a proporção 16:9 sempre */
        transform: scale(calc(min(100vw / 1920, 100vh / 1080)));
        position: relative;
    }

    /* Título e Barra posicionados absolutamente para não empurrar o canvas */
    #titulo-header { 
        position: absolute; top: 20px; width: 100%; text-align: center;
        color: #00ffff; font-size: 60px; text-transform: uppercase; z-index: 2;
    }
    #status-bar { 
        position: absolute; top: 100px; width: 1400px; left: 260px; 
        padding: 15px; color: #ffcc00; text-align: center; font-size: 30px; 
        border: 2px solid #333; background: rgba(0,0,0,0.8); z-index: 2;
    }
    
    #game-container { 
        width: 1920px; height: 1080px; 
        background: url('ambiente.jpg') no-repeat center center; 
        background-size: 100% 100%; 
        position: relative;
    }
    
    /* Canvas exatamente sobre o container */
    canvas { 
        position: absolute; top: 0; left: 0; 
        width: 1920px; height: 1080px; 
        pointer-events: none; /* Garante que os cliques passem para os botões/bolinhas */
    }
</style>

<div id="game-wrapper">
    <h1 id="titulo-header">LABORATÓRIO SMT PRO</h1>
    <div id="status-bar">CARREGANDO...</div>
    <div id="game-container">
        <canvas id="canvasAnim" width="1920" height="1080"></canvas>
        <div id="b1" class="bolinha"></div>
        <div id="b2" class="bolinha"></div>
    </div>
</div>
