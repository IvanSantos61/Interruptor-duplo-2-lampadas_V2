<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Pro - Simulador Interativo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: #05070a;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Container com proporção 1920x1080 resistente ao zoom */
        #app-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            background-color: #000;
        }

        /* 1. ÁREA DO TÍTULO (Fora do quadro principal) */
        #zona-titulo {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .titulo-cyan {
            color: #00f2ff;
            font-size: 50px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        /* 2. ÁREA DE STATUS (Fora do quadro principal) */
        #zona-status {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .caixa-status {
            background: rgba(20, 25, 30, 0.9);
            border: 1px solid #1a3a5a;
            padding: 10px 40px;
            border-radius: 8px;
            min-width: 600px;
            text-align: center;
        }
        .texto-gold {
            color: #ffcc00;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 3. QUADRO PRINCIPAL DE EQUIPAMENTOS */
        #quadro-principal {
            flex: 1;
            position: relative;
            margin: 0 40px 40px 40px;
            border: 3px solid #222;
            overflow: hidden;
            background-color: #111;
        }

        .camada-grafica {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .cabo-oculto { display: none; }

        /* Estilo das Bolinhas de Indicação */
        .ponto-conexao {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: background-color 0.3s, transform 0.2s;
        }
        .ponto-conexao:hover { transform: scale(1.2); }
        
        /* Cores das bolinhas conforme o cabo */
        .ponto-fase { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .ponto-neutro { background-color: #0066ff; box-shadow: 0 0 15px #0066ff; }
        .ponto-retorno { background-color: #ffffff; box-shadow: 0 0 15px #ffffff; }
        .ponto-sucesso { background-color: #00ff00 !important; box-shadow: 0 0 15px #00ff00 !important; }

        #btn-reiniciar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #cc0000;
            color: white;
            border: none;
            padding: 10px 30px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <header id="zona-titulo">
            <h1 class="titulo-cyan">LABORATÓRIO SMT PRO</h1>
        </header>

        <section id="zona-status">
            <div class="caixa-status">
                <p class="texto-gold" id="texto-instrucao">INICIAR INSTALAÇÃO: CLIQUE NA ORIGEM DO CABO FASE</p>
            </div>
        </section>

        <main id="quadro-principal">
            <img src="ambiente.jpg" class="camada-grafica">
            
            <img id="camada-fase-rede" class="camada-grafica cabo-oculto">
            <img id="camada-neutro-rede" class="camada-grafica cabo-oculto">
            <img id="camada-fase-2" class="camada-grafica cabo-oculto">
            <img id="camada-neutro-2" class="camada-grafica cabo-oculto">
            <img id="camada-retorno" class="camada-grafica cabo-oculto">

            <div id="container-pontos"></div>

            <button id="btn-reiniciar">REINICIAR</button>
        </main>

    </div>

    <script>
        // --- CONFIGURAÇÃO DE ESCALA ---
        const container = document.getElementById('app-container');
        function ajustarEscala() {
            const escala = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            container.style.transform = `scale(${escala})`;
        }
        window.addEventListener('resize', ajustarEscala);
        window.addEventListener('load', ajustarEscala);

        // --- DADOS DA SIMULAÇÃO ---
        // Aqui você define as coordenadas (x, y) de onde as bolinhas devem aparecer no seu ambiente.jpg
        const roteiro = [
            { 
                nome: "Fase Rede", 
                pasta: "FASE_REDE", total: 64, idCamada: "camada-fase-rede", cor: "ponto-fase",
                origem: { x: 540, y: 420 }, destino: { x: 540, y: 550 }
            },
            { 
                nome: "Neutro Rede", 
                pasta: "NEUTRO_REDE", total: 76, idCamada: "camada-neutro-rede", cor: "ponto-neutro",
                origem: { x: 580, y: 420 }, destino: { x: 580, y: 550 }
            },
            { 
                nome: "Fase Circuito 2", 
                pasta: "FASE_2", total: 25, idCamada: "camada-fase-2", cor: "ponto-fase",
                origem: { x: 650, y: 600 }, destino: { x: 1150, y: 750 }
            }
            // Adicione os outros conforme necessário seguindo o mesmo padrão
        ];

        let etapaAtual = 0;
        const textoInstrucao = document.getElementById('texto-instrucao');
        const containerPontos = document.getElementById('container-pontos');

        function iniciarEtapa() {
            if (etapaAtual >= roteiro.length) {
                textoInstrucao.innerText = "INSTALAÇÃO CONCLUÍDA COM SUCESSO!";
                return;
            }

            const dados = roteiro[etapaAtual];
            textoInstrucao.innerText = `CONECTE O CABO: ${dados.nome.toUpperCase()}`;
            
            // Cria a bolinha de origem
            criarPonto(dados.origem.x, dados.origem.y, dados.cor, () => {
                // Ao clicar na origem: muda cor para verde e cria o destino
                const pontoOrigem = containerPontos.lastChild;
                pontoOrigem.classList.add('ponto-sucesso');
                
                criarPonto(dados.destino.x, dados.destino.y, dados.cor, () => {
                    // Ao clicar no destino: remove bolinhas e inicia animação do cabo
                    containerPontos.innerHTML = "";
                    executarAnimacao(dados);
                });
            });
        }

        function criarPonto(x, y, classeCor, acao) {
            const ponto = document.createElement('div');
            ponto.className = `ponto-conexao ${classeCor}`;
            ponto.style.left = x + "px";
            ponto.style.top = y + "px";
            ponto.onclick = (e) => {
                e.stopPropagation();
                acao();
            };
            containerPontos.appendChild(ponto);
        }

        function executarAnimacao(dados) {
            const img = document.getElementById(dados.idCamada);
            img.classList.remove('cabo-oculto');
            let frame = 1;

            function animar() {
                if (frame <= dados.total) {
                    const sufixo = String(frame).padStart(4, '0');
                    img.src = `${dados.pasta}/quadro${sufixo}.png`;
                    frame++;
                    requestAnimationFrame(animar);
                } else {
                    etapaAtual++;
                    iniciarEtapa();
                }
            }
            animar();
        }

        document.getElementById('btn-reiniciar').onclick = () => location.reload();

        // Inicia o processo
        iniciarEtapa();
    </script>
</body>
</html>
