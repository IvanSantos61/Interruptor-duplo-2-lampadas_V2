<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Conectores</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #titulo-projeto {
            color: #00f2ff;
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        #linha-status {
            background: rgba(10, 15, 20, 0.9);
            border: 1px solid #1a3a5a;
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
            text-align: center;
        }

        .texto-status {
            color: #ffcc00;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            text-transform: uppercase;
        }

        #quadro-simulacao {
            position: relative;
            width: 100%;
            max-width: 1600px;
            aspect-ratio: 1920 / 1080;
            background-color: #000;
            border: 2px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .camada {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .oculto { display: none; }

        /* PONTOS DE INTERAÇÃO */
        .ponto {
            position: absolute;
            width: 1.8%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: transform 0.2s;
        }
        .ponto:hover { transform: translate(-50%, -50%) scale(1.3); }

        .fase { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .neutro { background-color: #0066ff; box-shadow: 0 0 15px #0066ff; }
        .retorno { background-color: #ffff00; box-shadow: 0 0 15px #ffff00; }
        .sucesso { background-color: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }

        /* BOTÃO REINICIAR - ESTILO PÍLULA */
        #btn-reiniciar {
            position: absolute;
            bottom: 3%;
            left: 2%;
            background: linear-gradient(180deg, #cc0000, #880000);
            color: white;
            border: 1px solid #500;
            padding: 0.8% 3.5%;
            font-size: 1.1vw;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #btn-reiniciar:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <h1 id="titulo-projeto">LABORATÓRIO SMT PRO</h1>

    <div id="linha-status">
        <span id="label-status" class="texto-status">SISTEMA PRONTO</span>
    </div>

    <main id="quadro-simulacao">
        <img src="ambiente.jpg" class="camada">

        <img id="img-con-derivacao" src="con_derivacao.png" class="camada oculto">

        <img id="img-fase-rede" class="camada oculto">
        <img id="img-neutro-rede" class="camada oculto">
        <img id="img-fase-circuito" class="camada oculto">
        <img id="img-retorno" class="camada oculto">
        <img id="img-neutro-circuito" class="camada oculto">

        <div id="interacao-container"></div>

        <button id="btn-reiniciar">REINICIAR</button>
    </main>

    <script>
        const roteiro = [
            { nome: "Fase de Entrada", pasta: "FASE_REDE", total: 64, imgId: "img-fase-rede", cor: "fase", origem: { x: 28.5, y: 39.2 }, destino: { x: 28.5, y: 52.5 } },
            { nome: "Neutro de Entrada", pasta: "NEUTRO_REDE", total: 76, imgId: "img-neutro-rede", cor: "neutro", origem: { x: 31.2, y: 39.2 }, destino: { x: 31.2, y: 52.5 } },
            { nome: "Fase do Circuito", pasta: "FASE_2", total: 25, imgId: "img-fase-circuito", cor: "fase", origem: { x: 35.0, y: 58.0 }, destino: { x: 60.5, y: 71.0 } },
            { nome: "Retorno da Lâmpada", pasta: "RETORNO", total: 45, imgId: "img-retorno", cor: "retorno", origem: { x: 62.0, y: 71.0 }, destino: { x: 74.5, y: 64.5 } },
            { nome: "Neutro da Lâmpada", pasta: "NEUTRO_2", total: 15, imgId: "img-neutro-circuito", cor: "neutro", origem: { x: 76.5, y: 64.5 }, destino: { x: 32.5, y: 58.0 } }
        ];

        let etapaAtual = 0;
        const cacheImagens = {};

        function proximoPasso() {
            if (etapaAtual >= roteiro.length) {
                document.getElementById('label-status').innerText = "INSTALAÇÃO CONCLUÍDA!";
                return;
            }
            
            const dados = roteiro[etapaAtual];
            document.getElementById('label-status').innerText = `CONECTE: ${dados.nome.toUpperCase()}`;
            
            // Lógica para exibir o conector de derivação nos cabos FASE_2 e NEUTRO_2
            if (dados.pasta === "FASE_2" || dados.pasta === "NEUTRO_2") {
                document.getElementById('img-con-derivacao').classList.remove('oculto');
            }

            preCarregarCabo(dados);

            criarPonto(dados.origem, dados.cor, function() {
                this.classList.add('sucesso');
                criarPonto(dados.destino, dados.cor, function() {
                    document.getElementById('interacao-container').innerHTML = "";
                    executarAnimacaoFluida(dados);
                });
            });
        }

        function preCarregarCabo(dados) {
            cacheImagens[dados.pasta] = [];
            for (let i = 1; i <= dados.total; i++) {
                const img = new Image();
                const num = String(i).padStart(4, '0');
                img.src = `${dados.pasta}/quadro${num}.png`;
                cacheImagens[dados.pasta].push(img);
            }
        }

        function criarPonto(pos, corClasse, cliqueFn) {
            const ponto = document.createElement('div');
            ponto.className = `ponto ${corClasse}`;
            ponto.style.left = pos.x + "%";
            ponto.style.top = pos.y + "%";
            ponto.onclick = (e) => { e.stopPropagation(); cliqueFn.call(ponto); };
            document.getElementById('interacao-container').appendChild(ponto);
        }

        function executarAnimacaoFluida(dados) {
            const imgElemento = document.getElementById(dados.imgId);
            imgElemento.classList.remove('oculto');
            
            let frameIdx = 0;
            const frames = cacheImagens[dados.pasta];
            const lentidao = 3; 
            let contador = 0;

            function animar() {
                if (frameIdx < frames.length) {
                    if (contador % lentidao === 0) {
                        imgElemento.src = frames[frameIdx].src;
                        frameIdx++;
                    }
                    contador++;
                    requestAnimationFrame(animar);
                } else {
                    etapaAtual++;
                    setTimeout(proximoPasso, 400);
                }
            }
            requestAnimationFrame(animar);
        }

        document.getElementById('btn-reiniciar').onclick = () => window.location.reload();
        window.onload = proximoPasso;
    </script>
</body>
</html>
