<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #game-container {
            position: relative;
            width: 90vw;
            max-width: 1920px;
            aspect-ratio: 1920 / 1080;
            background: url('ambiente.jpg') no-repeat center center;
            background-size: contain;
            overflow: hidden; 
        }
        
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bolinha {
            width: 2%; aspect-ratio: 1/1;
            border-radius: 50%; position: absolute;
            cursor: pointer; display: none;
            border: 2px solid white; z-index: 1000;
        }

        .conector {
            position: absolute; 
            width: 100px; 
            z-index: 999 !important; 
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <img id="derivacao_fase2" class="conector" src="con_derivacao.png" style="top: 13.3%; left: 71%;">
    <img id="derivacao_neutro" class="conector" src="con_derivacao.png" style="top: 10.2%; left: 91.5%;">
    
    <canvas id="canvasCabo" width="1920" height="1080"></canvas>
    <div id="bolinha1" class="bolinha"></div>
    <div id="bolinha2" class="bolinha"></div>
</div>

<script>
    const cabos = [
        { nome: "FASE_REDE", total: 64, b1: {x: 26, y: 38}, b2: {x: 97.5, y: 15}, cor: "red" },
        { nome: "NEUTRO_REDE", total: 76, b1: {x: 43.2, y: 32}, b2: {x: 98, y: 12}, cor: "blue" },
        { nome: "FASE_2", total: 25, b1: {x: 74, y: 17}, b2: {x: 72, y: 68}, cor: "red" },
        { nome: "RETORNO", total: 45, b1: {x: 72, y: 74}, b2: {x: 87, y: 58}, cor: "yellow" },
        { nome: "NEUTRO_2", total: 15, b1: {x: 92, y: 14}, b2: {x: 89.5, y: 58}, cor: "blue" }
    ];

    let indiceAtual = 0;
    let cabosConcluidos = [];
    const canvas = document.getElementById('canvasCabo');
    const ctx = canvas.getContext('2d');
    const b1 = document.getElementById('bolinha1'), b2 = document.getElementById('bolinha2');
    
    const conFase2 = document.getElementById("derivacao_fase2");
    const conNeutro = document.getElementById("derivacao_neutro");

    function atualizarCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        cabosConcluidos.forEach(c => {
            let img = new Image();
            img.src = `${c.nome}/quadro${c.total.toString().padStart(4, '0')}.png`;
            img.onload = () => ctx.drawImage(img, 0, 0);
        });
    }

    function iniciarCabo() {
        if (indiceAtual >= cabos.length) return;
        const c = cabos[indiceAtual];
        
        // A lógica de "resetar" (display = none) foi removida.
        // O conector só é ativado se for a vez dele.
        if (c.nome === "FASE_2") conFase2.style.display = "block";
        if (c.nome === "NEUTRO_2") conNeutro.style.display = "block";
        
        b1.style.display = "block";
        b1.style.backgroundColor = c.cor;
        b1.style.left = c.b1.x + "%"; 
        b1.style.top = c.b1.y + "%";
        b2.style.display = "none";
        b2.style.backgroundColor = c.cor;
        
        b1.onclick = () => {
            b1.style.backgroundColor = "green";
            b2.style.left = c.b2.x + "%"; 
            b2.style.top = c.b2.y + "%";
            b2.style.display = "block";
        };

        b2.onclick = () => {
            b1.style.display = "none";
            b2.style.display = "none";
            animar(c);
        };
    }

    function animar(c) {
        let frame = 1;
        let intv = setInterval(() => {
            let img = new Image();
            img.src = `${c.nome}/quadro${frame.toString().padStart(4, '0')}.png`;
            img.onload = () => {
                atualizarCanvas();
                ctx.drawImage(img, 0, 0);
            };
            if (++frame > c.total) {
                clearInterval(intv);
                // NADA AQUI esconde os conectores. Eles ficam na tela permanentemente.
                cabosConcluidos.push(c);
                indiceAtual++;
                setTimeout(iniciarCabo, 500); 
            }
        }, 50);
    }

    iniciarCabo();
</script>
</body>
</html>
