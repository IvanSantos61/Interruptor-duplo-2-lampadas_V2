<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #game-wrapper { width: 1920px; height: 1080px; transform-origin: center; transform: scale(calc(min(90vw / 1920, 80vh / 1080))); position: relative; background: url('ambiente.jpg'); background-size: 100% 100%; }
        #canvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; pointer-events: none; }
        .bolinha { width: 40px; height: 40px; border-radius: 50%; border: 4px solid white; position: absolute; cursor: pointer; display: none; z-index: 100; }
        #status { position: absolute; top: 120px; left: 260px; width: 1400px; color: #ffcc00; font-size: 40px; text-align: center; background: rgba(0,0,0,0.8); border: 2px solid #333; z-index: 10; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <h1 style="position:absolute; top:20px; width:100%; text-align:center; color:#00ffff; font-size:80px; margin:0;">LABORATÓRIO SMT PRO</h1>
        <div id="status">INICIANDO...</div>
        <canvas id="canvas" width="1920" height="1080"></canvas>
        <div id="b1" class="bolinha"></div>
        <div id="b2" class="bolinha"></div>
    </div>

<script>
    const config = [
        { nome: "FASE_REDE", total: 64, cor: "red", p1: {x: 200, y: 200}, p2: {x: 1000, y: 500} },
        { nome: "NEUTRO_REDE", total: 76, cor: "blue", p1: {x: 300, y: 300}, p2: {x: 1100, y: 600} },
        { nome: "FASE_2", total: 25, cor: "red", p1: {x: 400, y: 400}, p2: {x: 1200, y: 700} },
        { nome: "RETORNO", total: 45, cor: "yellow", p1: {x: 500, y: 500}, p2: {x: 1300, y: 800} },
        { nome: "NEUTRO_2", total: 15, cor: "blue", p1: {x: 600, y: 600}, p2: {x: 1400, y: 900} }
    ];

    let i = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const b1 = document.getElementById('b1'), b2 = document.getElementById('b2');
    const status = document.getElementById('status');

    function rodarCiclo() {
        if (i >= config.length) { status.innerText = "LABORATÓRIO CONCLUÍDO!"; return; }
        let c = config[i];
        status.innerText = "CONECTE: " + c.nome.replace('_', ' ');
        
        b1.style.left = c.p1.x + "px"; b1.style.top = c.p1.y + "px"; b1.style.backgroundColor = c.cor;
        b1.style.display = "block"; b2.style.display = "none";

        b1.onclick = () => {
            b1.style.backgroundColor = "green";
            b2.style.left = c.p2.x + "px"; b2.style.top = c.p2.y + "px"; b2.style.backgroundColor = c.cor;
            b2.style.display = "block";
        };

        b2.onclick = () => {
            b1.style.display = "none"; b2.style.display = "none";
            animar(c);
        };
    }

    function animar(c) {
        let f = 1;
        let intv = setInterval(() => {
            let img = new Image();
            img.src = `${c.nome}/quadro${f.toString().padStart(4, '0')}.png`;
            img.onload = () => { ctx.drawImage(img, 0, 0, 1920, 1080); };
            if (++f > c.total) { clearInterval(intv); i++; rodarCiclo(); }
        }, 50);
    }

    rodarCiclo();
</script>
</body>
</html>
