<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #main-container { width: 1400px; height: 800px; background: #141a24; border: 2px solid #2d3748; border-radius: 20px; display: flex; flex-direction: column; align-items: center; }
        #canvas-wrapper { width: 1330px; height: 750px; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        .bolinha { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; position: absolute; cursor: pointer; display: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="main-container">
        <h1 style="color: #00ffff; font-size: 40px; margin: 15px 0;">LABORATÓRIO SMT PRO</h1>
        <div id="status" style="width: 90%; padding: 10px; color: #ffcc00; text-align: center; font-size: 20px; border: 2px solid #333; background: #000; margin-bottom: 15px;">CARREGANDO...</div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="1920" height="1080"></canvas>
            <div id="b1" class="bolinha"></div>
            <div id="b2" class="bolinha"></div>
        </div>
    </div>

<script>
    // --- CONFIGURAÇÃO DE AJUSTE DOS CONECTORES ---
    const AJUSTE_CONECTOR = {
        offsetX: -25, // Ajuste horizontal (x + valor)
        offsetY: -25, // Ajuste vertical (y + valor)
        width: 50,    // Largura da imagem
        height: 50    // Altura da imagem
    };
    // ----------------------------------------------

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const b1 = document.getElementById('b1'), b2 = document.getElementById('b2');

    const config = [
        { nome: "FASE_REDE", total: 64, cor: "red", p1: {x: 200, y: 200}, p2: {x: 1000, y: 500} },
        { nome: "NEUTRO_REDE", total: 76, cor: "blue", p1: {x: 250, y: 250}, p2: {x: 1050, y: 550} },
        { nome: "FASE_2", total: 25, cor: "red", p1: {x: 300, y: 300}, p2: {x: 1100, y: 600} },
        { nome: "RETORNO", total: 45, cor: "yellow", p1: {x: 350, y: 350}, p2: {x: 1150, y: 650} },
        { nome: "NEUTRO_2", total: 15, cor: "blue", p1: {x: 400, y: 400}, p2: {x: 1200, y: 700} }
    ];

    let i = 0;

    const fundo = new Image();
    fundo.src = 'ambiente.jpg';
    fundo.onload = () => { ctx.drawImage(fundo, 0, 0, 1920, 1080); rodarCiclo(); };

    function desenharConector(x, y) {
        const conector = new Image();
        conector.src = 'con_derivacao.png';
        conector.onload = () => {
            ctx.drawImage(
                conector, 
                x + AJUSTE_CONECTOR.offsetX, 
                y + AJUSTE_CONECTOR.offsetY, 
                AJUSTE_CONECTOR.width, 
                AJUSTE_CONECTOR.height
            );
        };
    }

    function rodarCiclo() {
        if (i >= config.length) { status.innerText = "LABORATÓRIO CONCLUÍDO!"; return; }
        let c = config[i];
        status.innerText = "CONECTE: " + c.nome.replace('_', ' ');
        
        b1.style.left = c.p1.x + "px"; b1.style.top = c.p1.y + "px"; b1.style.backgroundColor = c.cor;
        b1.style.display = "block"; b2.style.display = "none";

        b1.onclick = () => {
            b1.style.backgroundColor = "green";
            
            if (c.nome === "FASE_2" || c.nome === "NEUTRO_2") {
                desenharConector(c.p1.x, c.p1.y);
            }
            
            b2.style.left = c.p2.x + "px"; b2.style.top = c.p2.y + "px"; b2.style.backgroundColor = c.cor;
            b2.style.display = "block";
        };

        b2.onclick = () => {
            b1.style.display = "none"; b2.style.display = "none";
            animar(c);
        };
    }

    function animar(c) {
        let f = 1;
        let intv = setInterval(() => {
            let img = new Image();
            img.src = `${c.nome}/quadro${f.toString().padStart(4, '0')}.png`;
            img.onload = () => { ctx.drawImage(img, 0, 0, 1920, 1080); };
            if (++f > c.total) { 
                clearInterval(intv); 
                i++; 
                rodarCiclo(); 
            }
        }, 50);
    }
</script>
</body>
</html>
