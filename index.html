<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Cabeamento</title>
    <style>
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: url('ambiente.png') no-repeat;
            margin: 0 auto;
            border: 1px solid #ccc;
        }
        .bolinha {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            display: none;
            border: 2px solid white;
            z-index: 10;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvasCabo" width="800" height="600"></canvas>
        <div id="bolinha1" class="bolinha"></div>
        <div id="bolinha2" class="bolinha"></div>
    </div>

    <script>
        const cabos = [
            { nome: "FASE_REDE", total: 64, b1: {x: 100, y: 100}, b2: {x: 300, y: 300}, cor: "red" },
            { nome: "NEUTRO_REDE", total: 76, b1: {x: 150, y: 150}, b2: {x: 350, y: 350}, cor: "blue" },
            { nome: "FASE2", total: 25, b1: {x: 200, y: 200}, b2: {x: 400, y: 400}, cor: "red" },
            { nome: "NEUTRO2", total: 15, b1: {x: 250, y: 250}, b2: {x: 450, y: 450}, cor: "blue" },
            { nome: "RETORNO", total: 45, b1: {x: 300, y: 300}, b2: {x: 500, y: 500}, cor: "yellow" }
        ];

        let indiceAtual = 0;
        const canvas = document.getElementById('canvasCabo');
        const ctx = canvas.getContext('2d');
        const b1 = document.getElementById('bolinha1');
        const b2 = document.getElementById('bolinha2');

        function formatarNumero(num) { return num.toString().padStart(4, '0'); }

        function iniciarCabo() {
            if (indiceAtual >= cabos.length) {
                alert("Todos os cabos foram conectados!");
                return;
            }
            const c = cabos[indiceAtual];
            
            b2.style.display = "none";
            b1.style.backgroundColor = c.cor;
            b1.style.left = c.b1.x + "px";
            b1.style.top = c.b1.y + "px";
            b1.style.display = "block";
            
            b1.onclick = () => {
                b1.style.backgroundColor = "green";
                b2.style.backgroundColor = c.cor;
                b2.style.left = c.b2.x + "px";
                b2.style.top = c.b2.y + "px";
                b2.style.display = "block";
            };

            b2.onclick = () => {
                b1.style.display = "none";
                b2.style.display = "none";
                animar(c);
            };
        }

        function animar(c) {
            let frame = 1;
            let intervalo = setInterval(() => {
                let img = new Image();
                // Ajuste o caminho abaixo conforme sua estrutura de pastas real
                img.src = `imagens/${c.nome}/quadro${formatarNumero(frame)}.png`;
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                };
                
                frame++;
                if (frame > c.total) {
                    clearInterval(intervalo);
                    indiceAtual++;
                    iniciarCabo();
                }
            }, 50);
        }

        // Inicia o processo
        iniciarCabo();
    </script>
</body>
</html>
