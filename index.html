<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT PRO - V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: #05070a;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #app-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            transform-origin: center center;
        }

        /* Camadas de Imagem (Fundo e Cabos) */
        .camada {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            pointer-events: none;
        }

        /* Interface de Usuário conforme a Gravura */
        #interface-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Título com Seta */
        .header-area {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .titulo-cyan {
            color: #00f2ff;
            font-size: 54px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.7);
        }

        /* Caixa de Instrução conforme a imagem */
        .instrucao-container {
            margin-top: 80px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .caixa-texto {
            background-color: rgba(0, 10, 20, 0.8);
            border: 1px solid #1a3a5a;
            border-radius: 15px;
            padding: 30px 60px;
            min-width: 800px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .texto-gold {
            color: #ffcc00;
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Botão Reiniciar */
        .footer-area {
            position: absolute;
            bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #btn-reiniciar {
            background: linear-gradient(to bottom, #cc0000, #880000);
            color: white;
            border: none;
            padding: 15px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        #btn-reiniciar:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Seta Amarela em CSS/SVG */
        .seta-amarela {
            width: 80px;
            height: 50px;
            fill: #ffcc00;
            filter: drop-shadow(0 0 5px rgba(255, 204, 0, 0.5));
        }

        /* Hotspots de Interação */
        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            /* background: rgba(0, 255, 255, 0.2); Descomente para ver as áreas */
        }
    </style>
</head>
<body>

    <div id="app-container">
        <img src="ambiente.jpg" class="camada">

        <img id="cabo-fase" src="FASE_REDE/quadro0001.png" class="camada" style="display:none;">
        <img id="cabo-neutro" src="NEUTRO_REDE/quadro0001.png" class="camada" style="display:none;">

        <div id="interface-layer">
            
            <div class="header-area">
                <h1 class="titulo-cyan">LABORATÓRIO SMT PRO</h1>
                <svg class="seta-amarela" viewBox="0 0 100 100"><path d="M10 50 L70 50 M50 20 L80 50 L50 80" stroke="#ffcc00" stroke-width="12" fill="none" stroke-linecap="round"/></svg>
            </div>

            <div class="instrucao-container">
                <div class="caixa-texto">
                    <p class="texto-gold" id="status-text">CONECTE A FASE: CLIQUE NA REFERÊNCIA DO DR</p>
                </div>
                <svg class="seta-amarela" viewBox="0 0 100 100"><path d="M10 50 L70 50 M50 20 L80 50 L50 80" stroke="#ffcc00" stroke-width="12" fill="none" stroke-linecap="round"/></svg>
            </div>

            <div class="footer-area">
                <button id="btn-reiniciar">REINICIAR</button>
                <svg class="seta-amarela" viewBox="0 0 100 100" style="transform: rotate(180deg);"><path d="M10 50 L70 50 M50 20 L80 50 L50 80" stroke="#ffcc00" stroke-width="12" fill="none" stroke-linecap="round"/></svg>
            </div>

            <div id="click-dr" class="hotspot" style="top: 400px; left: 540px; width: 60px; height: 100px;"></div>
            <div id="click-interruptor" class="hotspot" style="top: 730px; left: 1150px; width: 60px; height: 100px;"></div>
        </div>
    </div>

    <script>
        // Sistema de Escala para Zoom do Navegador
        const container = document.getElementById('app-container');
        function redimensionar() {
            const escala = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            container.style.transform = `scale(${escala})`;
        }
        window.addEventListener('resize', redimensionar);
        window.addEventListener('load', redimensionar);

        // Lógica simples de clique
        document.getElementById('click-dr').addEventListener('click', () => {
            document.getElementById('status-text').innerText = "CONECTANDO ENTRADA...";
            // Aqui entra sua função de animação dos quadros
        });

        document.getElementById('btn-reiniciar').addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
