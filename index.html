<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Help Interativo</title>
    <style>
        /* Mantendo os estilos anteriores para consistência */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #05070a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #titulo-projeto { color: #00f2ff; font-size: clamp(24px, 5vw, 48px); font-weight: 900; text-transform: uppercase; margin-bottom: 15px; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        #linha-status { background: rgba(10, 15, 20, 0.9); border: 1px solid #1a3a5a; padding: 15px 30px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 1200px; text-align: center; }
        .texto-status { color: #ffcc00; font-size: clamp(16px, 2.5vw, 24px); font-weight: bold; text-transform: uppercase; }
        #quadro-simulacao { position: relative; width: 100%; max-width: 1600px; aspect-ratio: 1920 / 1080; background-color: #000; border: 2px solid #333; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .camada { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .tecla-interativa { position: absolute; z-index: 60; cursor: pointer; }
        
        /* Conectores e Painel de Status */
        #con-fase { position: absolute; top: 17.5%; left: 73.5%; width: 5%; z-index: 50; transform: translate(-50%, -50%); }
        #con-neutro { position: absolute; top: 14.5%; left: 93.5%; width: 5%; z-index: 50; transform: translate(-50%, -50%); }
        .oculto { display: none !important; }

        #painel-dispositivos { position: absolute; top: 25%; left: 55%; width: 22%; background: rgba(5, 15, 30, 0.95); border: 2px solid #00f2ff; border-radius: 8px; z-index: 500; }
        #painel-dispositivos h3 { background: #008899; color: white; text-align: center; font-size: 1.1vw; padding: 8px; text-transform: uppercase; border-bottom: 2px solid #00f2ff; }
        .linha-dispositivo { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(255, 255, 255, 0.05); border-left: 4px solid #1a3a5a; font-weight: bold; font-size: 1vw; margin-bottom: 5px; }
        .status-on { color: #00ff00; } .status-off { color: #ff3333; }

        /* Estilos de Ajuda e Modais */
        #overlay-ajuda { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .modal-ajuda { background: #0a1015; border: 2px solid #1a3a5a; width: 40%; padding: 30px; border-radius: 12px; }
        .item-ajuda { background: rgba(255, 255, 255, 0.03); border: 1px solid #1a3a5a; margin-bottom: 10px; padding: 15px; color: white; cursor: pointer; font-weight: bold; font-size: 1.1vw; }
        #visualizador-tecnico { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Cursor para o conector interativo */
        .cursor-clique { cursor: pointer; transition: transform 0.1s; }
        .cursor-clique:active { transform: scale(0.98); }

        #btn-ajuda { position: absolute; bottom: 10.5%; left: 15%; background: linear-gradient(180deg, #008899, #004455); color: white; border: 1px solid #00f2ff; padding: 0.6% 3.5%; font-size: 1.1vw; font-weight: bold; border-radius: 50px; cursor: pointer; z-index: 200; }
        #btn-reiniciar { position: absolute; bottom: 3%; left: 13.5%; background: linear-gradient(180deg, #cc0000, #880000); color: white; border: 1px solid #500; padding: 0.6% 3.5%; font-size: 1.1vw; font-weight: bold; border-radius: 50px; cursor: pointer; z-index: 200; }
    </style>
</head>
<body>

    <h1 id="titulo-projeto">LABORATÓRIO SMT PRO</h1>

    <div id="linha-status">
        <span id="label-status" class="texto-status">SISTEMA PRONTO</span>
    </div>

    <main id="quadro-simulacao">
        <img src="ambiente.jpg" class="camada">

        <img id="comp-dg" src="al_dg_off.png" data-state="off" class="tecla-interativa" style="width:4%; top:26%; left:12%" onclick="toggleComp(this, 'al_dg_off.png', 'al_dg_on.png')">
        <img id="comp-dr" src="al_dr_off.png" data-state="off" class="tecla-interativa" style="width:5%; top:29%; left:23.6%" onclick="toggleComp(this, 'al_dr_off.png', 'al_dr_on.png')">
        <img id="comp-int" src="tec_int_off.png" data-state="off" class="tecla-interativa" style="width:6%; top:67%; left:63%" onclick="acionarPulsador(this, 'tec_int_off.png', 'tec_int_on.png')">

        <img id="con-fase" src="con_derivacao.png" class="oculto">
        <img id="con-neutro" src="con_derivacao.png" class="oculto">

        <img id="img-fase-rede" class="camada oculto">
        <img id="img-neutro-rede" class="camada oculto">
        <img id="img-fase-circuito" class="camada oculto">
        <img id="img-retorno" class="camada oculto">
        <img id="img-neutro-circuito" class="camada oculto">

        <div id="painel-dispositivos" class="oculto">
            <h3>Posição dos Dispositivos</h3>
            <div class="lista-status">
                <div class="linha-dispositivo"><span>DG</span><span id="txt-dg">[ OFF ] ❌</span></div>
                <div class="linha-dispositivo"><span>DR</span><span id="txt-dr">[ OFF ] ❌</span></div>
                <div class="linha-dispositivo"><span>INT.</span><span id="txt-int">[ OFF ] ❌</span></div>
            </div>
        </div>

        <div id="interacao-container"></div>
        <button id="btn-ajuda" onclick="abrirAjuda()">AJUDA</button>
        <button id="btn-reiniciar" onclick="location.reload()">REINICIAR</button>

        <div id="overlay-ajuda" class="oculto">
            <div class="modal-ajuda">
                <h2 style="color:#ffcc00; margin-bottom:20px; text-align:center;">Ajuda Técnica</h2>
                <div class="item-ajuda" onclick="mostrarImagemTecnica('ligaint.png')">1. Ligação do interruptor pulsador</div>
                <div class="item-ajuda" onclick="mostrarImagemTecnica('ligcamp.png')">2. Ligação da campainha</div>
                <div class="item-ajuda" onclick="mostrarImagemTecnica('ligcamp.png')">3. Conexões e emendas</div>
                <div class="item-ajuda" onclick="abrirAnimacaoConector()">4. Instalação do conector de derivação</div>
                <div class="item-ajuda" onclick="mostrarImagemTecnica('listamatcp.png')">5. Lista de material</div>
                <button onclick="fecharAjuda()" style="margin: 20px auto; display:block; padding:10px 20px; cursor:pointer;">Fechar</button>
            </div>
        </div>

        <div id="visualizador-tecnico" class="oculto">
            <img id="img-tecnica-exibida" src="" style="max-width:90%; max-height:80%;">
            <p id="legenda-ajuda" style="color: #00f2ff; margin-top: 10px; font-weight: bold;"></p>
            <button onclick="voltarParaLista()" style="margin-top:20px; background:#ffcc00; border:none; padding:10px 30px; font-weight:bold; cursor:pointer;">VOLTAR</button>
        </div>
    </main>

    <audio id="audio-int" src="int.mp3"></audio>
    <audio id="audio-disj" src="disj.mp3"></audio>
    <audio id="audio-conexao" src="conexao.mp3"></audio>
    <audio id="audio-campainha" src="campainha.mp3"></audio>

    <script>
        const roteiro = [
            { nome: "Fase de Entrada", pasta: "FASE_REDE", total: 64, imgId: "img-fase-rede", cor: "fase", origem: { x: 27, y: 38.5 }, destino: { x: 98.5, y: 17.5 } },
            { nome: "Neutro de Entrada", pasta: "NEUTRO_REDE", total: 76, imgId: "img-neutro-rede", cor: "neutro", origem: { x: 44.3, y: 35.2 }, destino: { x: 98.5, y: 14 } },
            { nome: "Fase do Pulsador", pasta: "FASE_2", total: 25, imgId: "img-fase-circuito", cor: "fase", origem: { x: 75, y: 19 }, destino: { x: 73.5, y: 71.0 } },
            { nome: "Retorno da Campainha", pasta: "RETORNO", total: 45, imgId: "img-retorno", cor: "retorno", origem: { x: 73, y: 76.5 }, destino: { x: 88.5, y: 59.5 } },
            { nome: "Neutro da Campainha", pasta: "NEUTRO_2", total: 15, imgId: "img-neutro-circuito", cor: "neutro", origem: { x: 92.5, y: 15.8 }, destino: { x: 90.2, y: 59.5 } }
        ];

        let etapaAtual = 0;
        const cacheImagens = {};

        function atualizarQuadroPosicao() {
            const dispositivos = [
                { idComp: 'comp-dg', idTxt: 'txt-dg' },
                { idComp: 'comp-dr', idTxt: 'txt-dr' },
                { idComp: 'comp-int', idTxt: 'txt-int' }
            ];
            dispositivos.forEach(disp => {
                const isON = document.getElementById(disp.idComp).getAttribute('data-state') === 'on';
                document.getElementById(disp.idTxt).innerHTML = isON ? `<span class="status-on">[ ON ] ✅</span>` : `<span class="status-off">[ OFF ] ❌</span>`;
            });
        }

        // --- LÓGICA DO ITEM 4 (ANIMAÇÃO CONECTOR) ---
        function abrirAnimacaoConector() {
            const img = document.getElementById('img-tecnica-exibida');
            const legenda = document.getElementById('legenda-ajuda');
            
            img.src = 'conectder_off.png';
            img.classList.add('cursor-clique');
            legenda.innerText = "CLIQUE NO CONECTOR PARA FECHAR/ABRIR";
            
            img.onclick = function() {
                tocarSom('audio-int'); // Aproveita o som de clique
                if (this.src.includes('conectder_off.png')) {
                    this.src = 'conectder_on.png';
                } else {
                    this.src = 'conectder_off.png';
                }
            };
            
            document.getElementById('visualizador-tecnico').classList.remove('oculto');
        }

        function mostrarImagemTecnica(src) {
            const img = document.getElementById('img-tecnica-exibida');
            const legenda = document.getElementById('legenda-ajuda');
            
            img.src = src;
            img.onclick = null; // Remove clique se houver
            img.classList.remove('cursor-clique');
            legenda.innerText = "";
            
            document.getElementById('visualizador-tecnico').classList.remove('oculto');
        }

        function voltarParaLista() {
            document.getElementById('visualizador-tecnico').classList.add('oculto');
        }

        function abrirAjuda() { document.getElementById('overlay-ajuda').classList.remove('oculto'); }
        function fecharAjuda() { document.getElementById('overlay-ajuda').classList.add('oculto'); }

        // Funções de Simulação (Simplificadas para o exemplo)
        function toggleComp(el, off, on) {
            tocarSom('audio-disj');
            const state = el.getAttribute('data-state') === 'off' ? 'on' : 'off';
            el.src = state === 'on' ? on : off;
            el.setAttribute('data-state', state);
            atualizarQuadroPosicao();
        }

        function acionarPulsador(el, off, on) {
            tocarSom('audio-int');
            el.src = on; el.setAttribute('data-state', 'on');
            atualizarQuadroPosicao();
            setTimeout(() => { 
                el.src = off; el.setAttribute('data-state', 'off'); 
                atualizarQuadroPosicao(); 
            }, 200);
        }

        function tocarSom(id) { const s = document.getElementById(id); if(s) { s.currentTime=0; s.play(); } }

        window.onload = () => {
            // Inicialização do roteiro e carregamento
            document.getElementById('label-status').innerText = "CONECTE: FASE DE ENTRADA";
            // Lógica de proximoPasso() deve ser chamada aqui como no código anterior
        };
    </script>
</body>
</html>
