<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #game-wrapper {
            width: 1920px; height: 1080px;
            transform-origin: center;
            transform: scale(calc(min(90vw / 1920, 80vh / 1080)));
            display: flex; flex-direction: column; align-items: center;
            background: #000;
        }

        #titulo-header { color: #00ffff; font-size: 60px; margin: 10px 0; text-transform: uppercase; }
        #status-bar { width: 1400px; padding: 20px; color: #ffcc00; text-align: center; font-size: 30px; border: 2px solid #333; background: rgba(0,0,0,0.8); margin-bottom: 10px; }
        
        #game-container { 
            width: 1400px; height: 850px; 
            background: url('ambiente.jpg') no-repeat center center; 
            background-size: contain; 
            position: relative; overflow: hidden;
        }
        
        /* Canvas fixo que recebe as camadas */
        canvas { position: absolute; top: 0; left: 0; width: 1400px; height: 850px; pointer-events: none; }
        
        .bolinha { width: 40px; height: 40px; border-radius: 50%; border: 4px solid white; position: absolute; cursor: pointer; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <h1 id="titulo-header">LABORATÓRIO SMT PRO</h1>
    <div id="status-bar">CARREGANDO...</div>
    <div id="game-container">
        <canvas id="canvasBase" width="1400" height="850"></canvas>
        <canvas id="canvasAnim" width="1400" height="850"></canvas>
        <div id="b1" class="bolinha"></div>
        <div id="b2" class="bolinha"></div>
    </div>
</div>

<script>
    const config = [
        { nome: "FASE_REDE", total: 64, cor: "red" },
        { nome: "NEUTRO_REDE", total: 76, cor: "blue" },
        { nome: "FASE_2", total: 25, cor: "red" },
        { nome: "RETORNO", total: 45, cor: "yellow" },
        { nome: "NEUTRO_2", total: 15, cor: "blue" }
    ];

    let indice = 0;
    const canvasBase = document.getElementById('canvasBase'); // Onde os cabos ficam gravados
    const ctxBase = canvasBase.getContext('2d');
    const canvasAnim = document.getElementById('canvasAnim'); // Onde o cabo atual é desenhado
    const ctxAnim = canvasAnim.getContext('2d');

    const b1 = document.getElementById('b1'), b2 = document.getElementById('b2');
    const status = document.getElementById('status-bar');

    function rodarCiclo() {
        if (indice >= config.length) { status.innerText = "LABORATÓRIO CONCLUÍDO!"; return; }
        const c = config[indice];
        status.innerText = `CONECTE: ${c.nome.replace('_', ' ')}`;
        
        // Ajuste aqui as posições de b1 e b2 para cada cabo
        b1.style.left = "200px"; b1.style.top = "200px"; b1.style.backgroundColor = c.cor;
        b1.style.display = "block";
        b2.style.display = "none";

        b1.onclick = () => {
            b2.style.left = "800px"; b2.style.top = "400px"; b2.style.backgroundColor = c.cor;
            b2.style.display = "block";
        };

        b2.onclick = () => {
            b1.style.display = "none"; b2.style.display = "none";
            animar(c);
        };
    }

function animar(c) {
        let f = 1;
        let intv = setInterval(() => {
            let img = new Image();
            img.src = `${c.nome}/quadro${f.toString().padStart(4, '0')}.png`;
            
            img.onload = () => { 
                // A MÁGICA ESTÁ AQUI: 
                // NÃO damos clearRect. Assim, o frame novo é desenhado 
                // sobre os pixels do frame anterior que já estão no canvas.
                ctx.drawImage(img, 0, 0, 1400, 850); 
            };
            
            if (++f > c.total) { 
                clearInterval(intv);
                indice++; 
                rodarCiclo(); 
            }
        }, 30);
    }

    rodarCiclo();
</script>
</body>
</html>
