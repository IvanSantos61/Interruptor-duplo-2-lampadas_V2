<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; overflow: hidden; font-family: sans-serif; }
        
        .neon-text { color: #00ffff; text-shadow: 0 0 10px #00ffff; text-transform: uppercase; font-weight: normal; }
        .neon-box { border: 2.5px solid #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); border-radius: 60px; background: rgba(0, 0, 0, 0.9); }

        #splash-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
            z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }
        #splash-content { text-align: center; padding: 3vw 5vw; width: auto; min-width: 45%; }
        
        #splash-content h1 { font-size: 3.8vw; margin-bottom: 1vw; opacity: 0.6; white-space: nowrap; }
        #splash-content h2 { font-size: 2.5vw; line-height: 1.1; margin: 1vw 0; }
        #splash-content h3 { font-size: 1.6vw; margin: 1vw 0; letter-spacing: 2px; }
        #splash-content p { font-size: 0.9vw; color: #757575; margin: 3vw 0 2vw 0; text-transform: none; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        #btn-iniciar { 
            padding: 0.7vw 1.8vw; cursor: pointer; background: transparent; 
            color: #00ffff; border: 1.5px solid #00ffff; font-size: 0.85vw; 
            border-radius: 50px; 
            text-shadow: 0 0 5px #00ffff; animation: pulse 1.5s infinite;
        }

        #main-layout { width: 90vw; max-width: 1920px; display: flex; flex-direction: column; align-items: center; }
        #titulo-header { font-size: 3.5vw; margin: 1vw 0; opacity: 0.8; }
        
        #status-bar { 
            width: 100%; padding: 1.5vw; box-sizing: border-box; margin-bottom: 1vw; 
            color: #ff8800; font-weight: normal; text-align: center; font-size: 1.2vw; 
            border: 2px solid #333; 
        }

        #game-container { 
            position: relative; width: 100%; aspect-ratio: 1920 / 1080; 
            background: url('ambiente.jpg') no-repeat center center; 
            background-size: contain; overflow: hidden; 
        }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .bolinha { width: 2%; aspect-ratio: 1/1; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 0.2vw solid white; z-index: 1000; box-sizing: border-box; }
        .conector { position: absolute; width: 5.2%; z-index: 999 !important; display: none; }
        #btn_dg, #btn_dr, #btn_int { position: absolute; z-index: 990; cursor: pointer; width: 5.7%; }

        .hotspot {
            position: absolute; background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff; cursor: pointer; z-index: 850; transition: all 0.3s;
        }
        .hotspot:hover { background: rgba(0, 255, 255, 0.3); border-width: 2px; }
        
        #info-box {
            position: absolute; top: 5%; left: 35%; width: 30%; padding: 1vw;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #00ffff; color: #00ffff;
            display: none; z-index: 3000; pointer-events: none; border-radius: 15px;
            text-align: center; font-size: 1.5vw; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="splash-overlay">
        <div id="splash-content" class="neon-box">
            <h1 class="neon-text">LABORATÓRIO SMT PRO</h1>
            <h2 class="neon-text">CAMPAINHA<br>ELETROMAGNÉTICA</h2>
            <h3 class="neon-text">CIRCUITO MONOFÁSICO - 127V</h3>
            <p>© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</p>
            <button id="btn-iniciar" class="neon-text">CLIQUE PARA INICIAR O LABORATÓRIO</button>
        </div>
    </div>

    <div id="main-layout">
        <h1 id="titulo-header" class="neon-text">LABORATÓRIO SMT PRO</h1>
        <div id="status-bar">REDE: CLIQUE NA REFERÊNCIA INDICADA NO BARRAMENTO PARA INICIAR A PASSAGEM DO NEUTRO</div>

        <div id="game-container">
            <div class="hotspot" style="top: 52%; left: 5%; width: 3vw; height: 12vw;" onmouseover="mostrarInfo('REDE ELÉTRICA')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 10%; left: 6.5%; width: 2vw; height: 16vw;" onmouseover="mostrarInfo('BARRA DE ATERRAMENTO')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 13%; left: 11.8%; width: 3vw; height: 12vw;" onmouseover="mostrarInfo('DISJUNTOR GERAL')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 13%; left: 15.8%; width: 2.8vw; height: 12vw;" onmouseover="mostrarInfo('DPS')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 12.8%; left: 19.5%; width: 7vw; height: 13vw;" onmouseover="mostrarInfo('DISPOSITIVO DR')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 13%; left: 28.5%; width: 9vw; height: 12vw;" onmouseover="mostrarInfo('DISJUNTORES DOS CIRCUITOS')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 10%; left: 43%; width: 2vw; height: 16vw;" onmouseover="mostrarInfo('BARRA DE NEUTRO')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 58.5%; left: 35%; width: 10vw; height: 14.5vw;" onmouseover="mostrarInfo('CAIXA DE PASSAGEM 4x2')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 10.5%; left: 51.5%; width: 10vw; height: 14.5vw;" onmouseover="mostrarInfo('CAIXA DE PASSAGEM 4x2')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 10.5%; left: 69.2%; width: 10vw; height: 14.5vw;" onmouseover="mostrarInfo('CAIXA DE PASSAGEM 4x2')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 10.5%; left: 86.5%; width: 10vw; height: 14.5vw;" onmouseover="mostrarInfo('CAIXA DE PASSAGEM 4x2')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 61%; left: 86%; width: 10vw; height: 14vw;" onmouseover="mostrarInfo('CAMPAINHA 127V')" onmouseout="esconderInfo()"></div>
            <div class="hotspot" style="top: 55%; left: 64%; width: 8vw; height: 16vw;" onmouseover="mostrarInfo('INTERRUPTOR DE PULSO')" onmouseout="esconderInfo()"></div>
            
            <div id="info-box"></div>

            <img id="derivacao_fase2" class="conector" src="con_derivacao.png" style="top: 13.3%; left: 71%;">
            <img id="derivacao_neutro" class="conector" src="con_derivacao.png" style="top: 10.2%; left: 91.5%;">
            <img id="btn_dg" src="al_dg_off.png" style="top: 26%; left: 12%; width: 3.9%;">
            <img id="btn_dr" src="al_dr_off.png" style="top: 28.6%; left: 23.4%;">
            <img id="btn_int" src="tec_int_off.png" style="top: 67.8%; left: 63.5%;">
            
            <canvas id="canvasCabo" width="1920" height="1080"></canvas>
            <div id="bolinha1" class="bolinha"></div>
            <div id="bolinha2" class="bolinha"></div>
        </div>
    </div>

<script>
    const somDisjuntor = new Audio('disj.mp3');
    const somConexao = new Audio('conexao.mp3');
    const somCampainha = new Audio('campainha.mp3');

    function mostrarInfo(nome) {
        const box = document.getElementById('info-box');
        box.innerText = nome;
        box.style.display = 'block';
    }
    function esconderInfo() {
        document.getElementById('info-box').style.display = 'none';
    }

    document.getElementById('btn-iniciar').onclick = () => {
        document.getElementById('splash-overlay').style.display = 'none';
        iniciarCabo();
    };

    function habilitarTroca(id, offImg, onImg) {
        const el = document.getElementById(id);
        if(el) {
            el.onclick = () => { 
                el.src = el.src.includes(offImg) ? onImg : offImg; 
                somDisjuntor.currentTime = 0;
                somDisjuntor.play();
            };
        }
    }
    
    function habilitarImpulso(id, offImg, onImg) {
        const el = document.getElementById(id);
        if (el) {
            const press = () => {
                el.src = onImg;
                const dgLigado = document.getElementById('btn_dg').src.includes('on');
                const drLigado = document.getElementById('btn_dr').src.includes('on');
                const fiaçãoOk = cabosConcluidos.length === cabos.length;
                if (dgLigado && drLigado && fiaçãoOk) {
                    somCampainha.currentTime = 0;
                    somCampainha.play();
                }
            };
            const release = () => { el.src = offImg; };
            el.onmousedown = press; el.onmouseup = release; el.onmouseleave = release;
            el.ontouchstart = press; el.ontouchend = release;
        }
    }

    habilitarTroca("btn_dg", "al_dg_off.png", "al_dg_on.png");
    habilitarTroca("btn_dr", "al_dr_off.png", "al_dr_on.png");
    habilitarImpulso("btn_int", "tec_int_off.png", "tec_int_on.png");

    const cabos = [
        { nome: "FASE_REDE", total: 64, b1: {x: 26, y: 38}, b2: {x: 97.5, y: 15}, cor: "red" },
        { nome: "NEUTRO_REDE", total: 76, b1: {x: 43.2, y: 32}, b2: {x: 98, y: 12}, cor: "blue" },
        { nome: "FASE_2", total: 25, b1: {x: 74, y: 17}, b2: {x: 72, y: 68}, cor: "red" },
        { nome: "RETORNO", total: 45, b1: {x: 72, y: 74}, b2: {x: 87, y: 58}, cor: "yellow" },
        { nome: "NEUTRO_2", total: 15, b1: {x: 92, y: 14}, b2: {x: 89.5, y: 58}, cor: "blue" }
    ];

    let indiceAtual = 0, cabosConcluidos = [];
    const canvas = document.getElementById('canvasCabo'), ctx = canvas.getContext('2d');
    const b1 = document.getElementById('bolinha1'), b2 = document.getElementById('bolinha2');
    const conFase2 = document.getElementById("derivacao_fase2"), conNeutro = document.getElementById("derivacao_neutro");
    const buffer = document.createElement('canvas'); buffer.width = 1920; buffer.height = 1080;
    const bCtx = buffer.getContext('2d');

    function atualizarBuffer() {
        bCtx.clearRect(0, 0, buffer.width, buffer.height);
        cabosConcluidos.forEach(c => {
            let img = new Image();
            img.src = `${c.nome}/quadro${c.total.toString().padStart(4, '0')}.png`;
            img.onload = () => { bCtx.drawImage(img, 0, 0); ctx.drawImage(buffer, 0, 0); };
        });
    }

    function iniciarCabo() {
        if (indiceAtual >= cabos.length) return;
        const c = cabos[indiceAtual];
        if (c.nome === "FASE_2") conFase2.style.display = "block";
        if (c.nome === "NEUTRO_2") conNeutro.style.display = "block";
        b1.style.display = "block"; b1.style.backgroundColor = c.cor;
        b1.style.left = c.b1.x + "%"; b1.style.top = c.b1.y + "%";
        b2.style.display = "none";
        b1.onclick = () => {
            b1.style.backgroundColor = "green";
            b2.style.backgroundColor = c.cor;
            b2.style.left = c.b2.x + "%"; b2.style.top = c.b2.y + "%";
            b2.style.display = "block";
        };
        b2.onclick = () => { b1.style.display = "none"; b2.style.display = "none"; animar(c); };
    }

    function animar(c) {
        let frame = 1;
        let intv = setInterval(() => {
            let img = new Image();
            img.src = `${c.nome}/quadro${frame.toString().padStart(4, '0')}.png`;
            img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(buffer, 0, 0); ctx.drawImage(img, 0, 0); };
            if (++frame > c.total) { 
                clearInterval(intv); 
                cabosConcluidos.push(c); 
                atualizarBuffer(); 
                somConexao.currentTime = 0;
                somConexao.play();
                indiceAtual++; 
                setTimeout(iniciarCabo, 500); 
            }
        }, 50);
    }
</script>
</body>
</html>
