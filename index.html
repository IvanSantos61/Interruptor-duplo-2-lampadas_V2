<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #game-wrapper { width: 1920px; height: 1080px; transform-origin: center; transform: scale(calc(min(90vw / 1920, 80vh / 1080))); position: relative; background: url('ambiente.jpg'); background-size: 100% 100%; }
        #canvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; }
        #status { position: absolute; top: 120px; left: 260px; width: 1400px; color: #ffcc00; font-size: 40px; text-align: center; background: rgba(0,0,0,0.8); border: 2px solid #333; z-index: 10; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <h1 style="position:absolute; top:20px; width:100%; text-align:center; color:#00ffff; font-size:80px; margin:0;">LABORATÓRIO SMT PRO</h1>
        <div id="status">INICIANDO...</div>
        <canvas id="canvas" width="1920" height="1080"></canvas>
    </div>

<script>
    const pastas = [
        { nome: "FASE_REDE", total: 64 },
        { nome: "NEUTRO_REDE", total: 76 },
        { nome: "FASE_2", total: 25 },
        { nome: "RETORNO", total: 45 },
        { nome: "NEUTRO_2", total: 15 }
    ];

    let i = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    function rodarProximo() {
        if (i >= pastas.length) { status.innerText = "LABORATÓRIO CONCLUÍDO!"; return; }
        let f = 1;
        let c = pastas[i];
        status.innerText = "EXECUTANDO: " + c.nome;

        let interval = setInterval(() => {
            let img = new Image();
            img.src = `${c.nome}/quadro${f.toString().padStart(4, '0')}.png`;
            
            img.onload = () => {
                // AQUI: Desenha o frame novo SEM APAGAR O QUE JÁ ESTÁ NO CANVAS
                ctx.drawImage(img, 0, 0, 1920, 1080);
            };

            if (++f > c.total) {
                clearInterval(interval);
                i++;
                rodarProximo();
            }
        }, 50);
    }

    rodarProximo();
</script>
</body>
</html>
