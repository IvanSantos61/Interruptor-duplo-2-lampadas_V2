<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Sistema de Ajuda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #titulo-projeto {
            color: #00f2ff;
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        #linha-status {
            background: rgba(10, 15, 20, 0.9);
            border: 1px solid #1a3a5a;
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
            text-align: center;
        }

        .texto-status {
            color: #ffcc00;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            text-transform: uppercase;
        }

        #quadro-simulacao {
            position: relative;
            width: 100%;
            max-width: 1600px;
            aspect-ratio: 1920 / 1080;
            background-color: #000;
            border: 2px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .camada {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* --- COMPONENTES --- */
        .tecla-interativa {
            position: absolute;
            z-index: 60;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .tecla-interativa:active { transform: scale(0.95); }

        #comp-dg { width: 4%; top: 26%; left: 12%; }
        #comp-dr { width: 5%; top: 29%; left: 23.6%; }
        #comp-int { width: 6%; top: 67%; left: 63%; }

        #con-fase, #con-neutro {
            position: absolute;
            z-index: 50;
            width: 5%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #con-fase { top: 17.5%; left: 73.5%; }
        #con-neutro { top: 14.5%; left: 93.5%; }

        .oculto { display: none !important; }

        .ponto {
            position: absolute;
            width: 1.8%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
        }

        .fase { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .neutro { background-color: #0066ff; box-shadow: 0 0 15px #0066ff; }
        .retorno { background-color: #ffff00; box-shadow: 0 0 15px #ffff00; }
        .sucesso { background-color: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }

        /* --- BOTÕES DE CONTROLE --- */
        #btn-ajuda {
            position: absolute;
            bottom: 8.5%;
            left: 2%;
            background: linear-gradient(180deg, #008899, #004455);
            color: white;
            border: 1px solid #00f2ff;
            padding: 0.6% 3.5%;
            font-size: 1.1vw;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        #btn-reiniciar {
            position: absolute;
            bottom: 3%;
            left: 2%;
            background: linear-gradient(180deg, #cc0000, #880000);
            color: white;
            border: 1px solid #500;
            padding: 0.6% 3.5%;
            font-size: 1.1vw;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            text-transform: uppercase;
        }

        /* --- MODAL DE AJUDA --- */
        #overlay-ajuda {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-ajuda {
            background: #0a1015;
            border: 2px solid #1a3a5a;
            width: 40%;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
        }

        .modal-ajuda h2 {
            color: #ffcc00;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 1.5vw;
        }

        .lista-ajuda { list-style: none; }

        .item-ajuda {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #1a3a5a;
            margin-bottom: 10px;
            padding: 15px;
            color: white;
            text-align: left;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1vw;
            transition: background 0.3s;
        }

        .item-ajuda:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: #00f2ff;
        }

        #btn-fechar-modal {
            margin-top: 20px;
            background: #222;
            color: #888;
            border: 1px solid #444;
            padding: 10px 30px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* --- VISUALIZADOR DE IMAGEM TÉCNICA --- */
        #visualizador-tecnico {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #img-tecnica-exibida {
            max-width: 90%;
            max-height: 85%;
            border: 2px solid #333;
        }

        #btn-voltar-lista {
            margin-top: 20px;
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 40px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1 id="titulo-projeto">LABORATÓRIO SMT PRO</h1>

    <div id="linha-status">
        <span id="label-status" class="texto-status">SISTEMA PRONTO</span>
    </div>

    <main id="quadro-simulacao">
        <img src="ambiente.jpg" class="camada">

        <img id="comp-dg" src="al_dg_off.png" class="tecla-interativa" onclick="toggleComp(this, 'al_dg_off.png', 'al_dg_on.png')">
        <img id="comp-dr" src="al_dr_off.png" class="tecla-interativa" onclick="toggleComp(this, 'al_dr_off.png', 'al_dr_on.png')">
        <img id="comp-int" src="tec_int_off.png" class="tecla-interativa" onclick="acionarPulsador(this, 'tec_int_off.png', 'tec_int_on.png')">

        <img id="con-fase" src="con_derivacao.png" class="oculto">
        <img id="con-neutro" src="con_derivacao.png" class="oculto">

        <img id="img-fase-rede" class="camada oculto">
        <img id="img-neutro-rede" class="camada oculto">
        <img id="img-fase-circuito" class="camada oculto">
        <img id="img-retorno" class="camada oculto">
        <img id="img-neutro-circuito" class="camada oculto">

        <div id="interacao-container"></div>
        
        <button id="btn-ajuda" onclick="abrirAjuda()">AJUDA</button>
        <button id="btn-reiniciar" onclick="location.reload()">REINICIAR</button>

        <div id="overlay-ajuda" class="oculto">
            <div class="modal-ajuda">
                <h2>Ajuda Técnico</h2>
                <div class="lista-ajuda">
                    <div class="item-ajuda" onclick="mostrarImagemTecnica('ligaint.png')">1. Ligação do interruptor pulsador</div>
                    <div class="item-ajuda" onclick="mostrarImagemTecnica('ligcamp.png')">2. Ligação da campainha</div>
                    <div class="item-ajuda" onclick="mostrarImagemTecnica('ligcamp.png')">3. Conexões e emendas</div>
                    <div class="item-ajuda" onclick="mostrarImagemTecnica('con_derivacao.png')">4. Instalação do conector de derivação</div>
                    <div class="item-ajuda" onclick="mostrarImagemTecnica('listamatcp.png')">5. Lista de material</div>
                </div>
                <button id="btn-fechar-modal" onclick="fecharAjuda()">Fechar</button>
            </div>
        </div>

        <div id="visualizador-tecnico" class="oculto">
            <img id="img-tecnica-exibida" src="">
            <button id="btn-voltar-lista" onclick="voltarParaLista()">VOLTAR PARA LISTA</button>
        </div>

    </main>

    <audio id="audio-campainha" src="campainha.mp3" preload="auto"></audio>
    <audio id="audio-int" src="int.mp3" preload="auto"></audio>
    <audio id="audio-disj" src="disj.mp3" preload="auto"></audio>
    <audio id="audio-conexao" src="conexao.mp3" preload="auto"></audio>

    <script>
        const roteiro = [
            { nome: "Fase de Entrada", pasta: "FASE_REDE", total: 64, imgId: "img-fase-rede", cor: "fase", origem: { x: 27, y: 38.5 }, destino: { x: 98.5, y: 17.5 } },
            { nome: "Neutro de Entrada", pasta: "NEUTRO_REDE", total: 76, imgId: "img-neutro-rede", cor: "neutro", origem: { x: 44.3, y: 35.2 }, destino: { x: 98.5, y: 14 } },
            { nome: "Fase do Pulsador", pasta: "FASE_2", total: 25, imgId: "img-fase-circuito", cor: "fase", origem: { x: 75, y: 19 }, destino: { x: 73.5, y: 71.0 } },
            { nome: "Retorno da Campainha", pasta: "RETORNO", total: 45, imgId: "img-retorno", cor: "retorno", origem: { x: 73, y: 76.5 }, destino: { x: 88.5, y: 59.5 } },
            { nome: "Neutro da Campainha", pasta: "NEUTRO_2", total: 15, imgId: "img-neutro-circuito", cor: "neutro", origem: { x: 92.5, y: 15.8 }, destino: { x: 90.2, y: 59.5 } }
        ];

        let etapaAtual = 0;
        const cacheImagens = {};

        // Funções de Áudio
        function tocarSom(id) {
            const som = document.getElementById(id);
            if (som) { som.currentTime = 0; som.play().catch(() => {}); }
        }

        // Funções do Modal de Ajuda
        function abrirAjuda() { document.getElementById('overlay-ajuda').classList.remove('oculto'); }
        function fecharAjuda() { document.getElementById('overlay-ajuda').classList.add('oculto'); }
        
        function mostrarImagemTecnica(src) {
            const vis = document.getElementById('visualizador-tecnico');
            const img = document.getElementById('img-tecnica-exibida');
            img.src = src;
            vis.classList.remove('oculto');
        }

        function voltarParaLista() { document.getElementById('visualizador-tecnico').classList.add('oculto'); }

        // Lógica de Simulação
        function proximoPasso() {
            if (etapaAtual >= roteiro.length) {
                document.getElementById('label-status').innerText = "INSTALAÇÃO CONCLUÍDA! TESTE A CAMPAINHA.";
                return;
            }
            const dados = roteiro[etapaAtual];
            document.getElementById('label-status').innerText = `CONECTE: ${dados.nome.toUpperCase()}`;
            if (dados.pasta === "FASE_2") document.getElementById('con-fase').classList.remove('oculto');
            if (dados.pasta === "NEUTRO_2") document.getElementById('con-neutro').classList.remove('oculto');
            preCarregarCabo(dados);
            criarPonto(dados.origem, dados.cor, function() {
                this.classList.add('sucesso');
                criarPonto(dados.destino, dados.cor, function() {
                    document.getElementById('interacao-container').innerHTML = "";
                    executarAnimacaoFluida(dados);
                });
            });
        }

        function toggleComp(el, offImg, onImg) {
            tocarSom('audio-disj');
            el.src = el.src.includes(offImg) ? onImg : offImg;
        }

        function acionarPulsador(el, offImg, onImg) {
            tocarSom('audio-int');
            el.src = onImg;
            const dgLigado = document.getElementById('comp-dg').src.includes('al_dg_on.png');
            const drLigado = document.getElementById('comp-dr').src.includes('al_dr_on.png');
            if (etapaAtual >= roteiro.length && dgLigado && drLigado) { tocarSom('audio-campainha'); }
            setTimeout(() => { el.src = offImg; }, 200);
        }

        function preCarregarCabo(dados) {
            cacheImagens[dados.pasta] = [];
            for (let i = 1; i <= dados.total; i++) {
                const img = new Image();
                img.src = `${dados.pasta}/quadro${String(i).padStart(4, '0')}.png`;
                cacheImagens[dados.pasta].push(img);
            }
        }

        function criarPonto(pos, corClasse, cliqueFn) {
            const ponto = document.createElement('div');
            ponto.className = `ponto ${corClasse}`;
            ponto.style.left = pos.x + "%";
            ponto.style.top = pos.y + "%";
            ponto.onclick = (e) => { e.stopPropagation(); cliqueFn.call(ponto); };
            document.getElementById('interacao-container').appendChild(ponto);
        }

        function executarAnimacaoFluida(dados) {
            const imgElemento = document.getElementById(dados.imgId);
            imgElemento.classList.remove('oculto');
            let frameIdx = 0;
            const frames = cacheImagens[dados.pasta];
            const lentidao = 3; 
            let contador = 0;
            function animar() {
                if (frameIdx < frames.length) {
                    if (contador % lentidao === 0) { imgElemento.src = frames[frameIdx].src; frameIdx++; }
                    contador++; requestAnimationFrame(animar);
                } else { tocarSom('audio-conexao'); etapaAtual++; setTimeout(proximoPasso, 400); }
            }
            requestAnimationFrame(animar);
        }

        window.onload = proximoPasso;
    </script>
</body>
</html>
