<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #05070a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Tooltips */
        .info-icon { position: absolute; width: 25px; height: 25px; background: #00f2ff; color: #000; border-radius: 50%; text-align: center; line-height: 25px; font-weight: bold; cursor: help; z-index: 1000; font-size: 14px; }
        .info-icon .tooltip-text { visibility: hidden; width: 220px; background-color: white; color: black; text-align: center; padding: 10px; border-radius: 6px; position: absolute; bottom: 125%; left: -100px; opacity: 0; transition: opacity 0.3s; font-size: 12px; border: 1px solid #ccc; font-weight: normal; z-index: 9999; }
        .info-icon:hover .tooltip-text { visibility: visible; opacity: 1; }
        .txt-vermelho { color: red; font-weight: bold; }

        #titulo-projeto { color: #00f2ff; font-size: clamp(24px, 5vw, 48px); font-weight: 900; text-transform: uppercase; margin-bottom: 15px; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        #linha-status { background: rgba(10, 15, 20, 0.9); border: 1px solid #1a3a5a; padding: 15px 30px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 1200px; text-align: center; }
        .texto-status { color: #ffcc00; font-size: clamp(16px, 2.5vw, 24px); font-weight: bold; text-transform: uppercase; }
        #quadro-simulacao { position: relative; width: 100%; max-width: 1600px; aspect-ratio: 1920 / 1080; background-color: #000; border: 2px solid #333; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .camada { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .tecla-interativa { position: absolute; z-index: 60; cursor: pointer; }
        .ponto { position: absolute; width: 1.8%; aspect-ratio: 1/1; border-radius: 50%; border: 2px solid #fff; cursor: pointer; z-index: 100; transform: translate(-50%, -50%); }
        .sucesso { background-color: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }
        .oculto { display: none !important; }
        #placa-concluido { position: absolute; top: 40%; left: 35%; background: rgba(0, 255, 0, 0.2); border: 3px solid #00ff00; color: #fff; padding: 50px; font-size: 3em; z-index: 1000; text-transform: uppercase; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>
    <h1 id="titulo-projeto">LABORATÓRIO SMT PRO</h1>
    <div id="linha-status"><span id="label-status" class="texto-status">SISTEMA PRONTO</span></div>

    <main id="quadro-simulacao">
        <div id="icon-1" class="info-icon oculto" style="top: 10%; right: 5%;">💡<span class="tooltip-text">A seção mínima dos fios de iluminação é 1,5 mm² <span class="txt-vermelho">(Item 6.2.6.1.1 da NBR-5410)</span></span></div>
        <div id="icon-2" class="info-icon oculto" style="top: 20%; right: 5%;">💡<span class="tooltip-text">A fase pode ser de qualquer cor <span class="txt-vermelho">(Item 6.1.5.3.4 da NBR-5410)</span></span></div>

        <img src="ambiente.jpg" class="camada">
        <img id="comp-dg" src="al_dg_off.png" data-state="off" class="tecla-interativa" style="width:4%; top:26%; left:12%;" onclick="toggleComp(this, 'al_dg_off.png', 'al_dg_on.png')">
        <img id="comp-dr" src="al_dr_off.png" data-state="off" class="tecla-interativa" style="width:5%; top:29%; left:23.6%;" onclick="toggleComp(this, 'al_dr_off.png', 'al_dr_on.png')">
        <img id="comp-int" src="tec_int_off.png" data-state="off" class="tecla-interativa" style="width:6%; top:67%; left:63%;" onclick="acionarPulsador(this, 'tec_int_off.png', 'tec_int_on.png')">
        
        <img id="img-fase-rede" class="camada oculto">
        <img id="img-neutro-rede" class="camada oculto">
        <img id="img-fase-circuito" class="camada oculto">
        <img id="img-retorno" class="camada oculto">
        <img id="img-neutro-circuito" class="camada oculto">

        <div id="placa-concluido" class="oculto">Instalação Concluída com Sucesso!</div>
        <div id="interacao-container"></div>
    </main>

    <script>
        const roteiro = [
            { nome: "Fase de Entrada", pasta: "FASE_REDE", total: 64, imgId: "img-fase-rede", cor: "fase", origem: { x: 27, y: 38.5 }, destino: { x: 98.5, y: 17.5 } },
            { nome: "Neutro de Entrada", pasta: "NEUTRO_REDE", total: 76, imgId: "img-neutro-rede", cor: "neutro", origem: { x: 44.3, y: 35.2 }, destino: { x: 98.5, y: 14 } },
            { nome: "Fase do Pulsador", pasta: "FASE_2", total: 25, imgId: "img-fase-circuito", cor: "fase", origem: { x: 75, y: 19 }, destino: { x: 73.5, y: 71.0 } },
            { nome: "Retorno da Campainha", pasta: "RETORNO", total: 45, imgId: "img-retorno", cor: "retorno", origem: { x: 73, y: 76.5 }, destino: { x: 88.5, y: 59.5 } },
            { nome: "Neutro da Campainha", pasta: "NEUTRO_2", total: 15, imgId: "img-neutro-circuito", cor: "neutro", origem: { x: 92.5, y: 15.8 }, destino: { x: 90.2, y: 59.5 } }
        ];

        let etapaAtual = 0;
        const cacheImagens = {};

        function proximoPasso() {
            if (etapaAtual >= roteiro.length) {
                document.getElementById('label-status').innerText = "PROJETO CONCLUÍDO";
                document.getElementById('placa-concluido').classList.remove('oculto');
                document.getElementById('icon-1').classList.remove('oculto');
                document.getElementById('icon-2').classList.remove('oculto');
                return;
            }
            const dados = roteiro[etapaAtual];
            document.getElementById('label-status').innerText = `CONECTE: ${dados.nome.toUpperCase()}`;
            preCarregarCabo(dados);
            criarPonto(dados.origem, dados.cor, function() {
                this.classList.add('sucesso');
                criarPonto(dados.destino, dados.cor, function() {
                    document.getElementById('interacao-container').innerHTML = "";
                    executarAnimacaoFluida(dados);
                });
            });
        }

        function executarAnimacaoFluida(dados) {
            const img = document.getElementById(dados.imgId);
            img.classList.remove('oculto');
            let frame = 1;
            const intervalo = setInterval(() => {
                if (frame > dados.total) {
                    clearInterval(intervalo);
                    etapaAtual++;
                    proximoPasso();
                } else {
                    img.src = `${dados.pasta}/quadro${String(frame).padStart(4, '0')}.png`;
                    frame++;
                }
            }, 30);
        }

        function criarPonto(pos, classe, fn) {
            const p = document.createElement('div');
            p.className = `ponto ${classe}`;
            p.style.left = pos.x + "%"; p.style.top = pos.y + "%";
            p.onclick = fn;
            document.getElementById('interacao-container').appendChild(p);
        }

        function toggleComp(el, off, on) {
            el.src = (el.getAttribute('data-state') === 'off') ? on : off;
            el.setAttribute('data-state', (el.getAttribute('data-state') === 'off') ? 'on' : 'off');
        }

        function acionarPulsador(el, off, on) {
            el.src = on;
            setTimeout(() => el.src = off, 200);
        }

        function preCarregarCabo(dados) { /* Lógica de carregamento */ }

        window.onload = proximoPasso;
    </script>
</body>
</html>
